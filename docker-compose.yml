services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: bi-demo-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.6.1
    container_name: bi-demo-kafka-connect
    hostname: kafka-connect
    depends_on:
      - kafka
      - source-db
      - target-db
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: bi-demo-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: bi_demo_connect_configs
      CONNECT_OFFSET_STORAGE_TOPIC: bi_demo_connect_offsets
      CONNECT_STATUS_STORAGE_TOPIC: bi_demo_connect_status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "true"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "true"
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
    command: >
      bash -c "
        confluent-hub install --no-prompt debezium/debezium-connector-postgresql:2.5.4 &&
        confluent-hub install --no-prompt confluentinc/kafka-connect-jdbc:10.7.6 &&
        /etc/confluent/docker/run
      "

  source-db:
    image: postgres:16.2
    container_name: bi-demo-source-db
    ports:
      - "5434:5432"
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_USER: sourceuser
      POSTGRES_PASSWORD: sourcepass
      POSTGRES_DB: sourcedb
    volumes:
      - ./sql/01_create_sample_data.sql:/docker-entrypoint-initdb.d/01_create_sample_data.sql:ro
      - source-db-data:/var/lib/postgresql/data

  target-db:
    image: postgres:16.2
    container_name: bi-demo-target-db
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: targetuser
      POSTGRES_PASSWORD: targetpass
      POSTGRES_DB: targetdb
    volumes:
      - target-db-data:/var/lib/postgresql/data

volumes:
  kafka-data:
  source-db-data:
  target-db-data:
